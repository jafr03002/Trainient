kind = "web"
previewPath = "/"
title = "Trainient"
version = "1.0.0"
id = "artifacts/traintent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24301

[services.development]
run = "pnpm --filter @workspace/traintent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/traintent", "run", "build" ]
publicDir = "artifacts/traintent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24301"
BASE_PATH = "/"

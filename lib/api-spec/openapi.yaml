openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Trainient AI Gym Coaching API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile and onboarding
  - name: programs
    description: Training programs
  - name: workouts
    description: Workout logging
  - name: checkins
    description: Weekly check-ins
  - name: progress
    description: Progress analytics
  - name: bodyweight
    description: Daily bodyweight logging
  - name: subscriptions
    description: Stripe subscription management
  - name: calendar
    description: Calendar colours

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Profile ──────────────────────────────────────────────────────────────────
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get the current user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
    post:
      operationId: createProfile
      tags: [profile]
      summary: Create or upsert user profile (called at end of onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /account:
    delete:
      operationId: deleteAccount
      tags: [profile]
      summary: Permanently delete the current user's account data
      description: >
        Deletes every row this user owns across all tables. Callers are
        expected to delete the Clerk user afterwards - this endpoint only
        clears application data, and does so first so a failure leaves the
        account still signed-in-able rather than stranding orphaned rows.
      responses:
        "204":
          description: Deleted

  # ── Programs ─────────────────────────────────────────────────────────────────
  /programs/current:
    get:
      operationId: getCurrentProgram
      tags: [programs]
      summary: Get the user's current active program within their active mode's program lineage (Independent vs. AI)
      parameters:
        - name: lineage
          in: query
          required: false
          description: Resolve "current" within this explicit lineage instead of the caller's active mode - lets either mode's program page view its own lineage without switching modes.
          schema:
            type: string
            enum: [ai, manual]
      responses:
        "200":
          description: Current program
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"
        "404":
          description: No active program

  /programs:
    get:
      operationId: listPrograms
      tags: [programs]
      summary: List all programs for the user
      responses:
        "200":
          description: List of programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"
    post:
      operationId: createManualProgram
      tags: [programs]
      summary: Create a manual (non-AI) program
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualProgramInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"

  /programs/generate:
    post:
      operationId: generateProgram
      tags: [programs]
      summary: Trigger AI generation of a new program based on user profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateProgramInput"
      responses:
        "201":
          description: Program generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"

  /programs/:id:
    put:
      operationId: updateProgram
      tags: [programs]
      summary: Update a manual (non-AI) program (add/edit days and exercises); AI-generated programs cannot be edited
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualProgramInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"

  /programs/{id}:
    patch:
      operationId: setProgramStartDate
      tags: [programs]
      summary: Set the user-chosen start date for a program (AI or manual)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgramStartDateUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"
        "404":
          description: Program not found

  # ── Workouts ─────────────────────────────────────────────────────────────────
  /workouts:
    get:
      operationId: listWorkouts
      tags: [workouts]
      summary: List workout logs for the user
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of workout logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutLog"
    post:
      operationId: createWorkout
      tags: [workouts]
      summary: Save a completed workout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutLogInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutLog"

  /workouts/recent:
    get:
      operationId: getRecentWorkouts
      tags: [workouts]
      summary: Get the 3 most recent workout logs (dashboard use)
      responses:
        "200":
          description: Recent workouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutLog"

  /workouts/stats:
    get:
      operationId: getWorkoutStats
      tags: [workouts]
      summary: Quick stats for the dashboard (current week, total logged, streak)
      responses:
        "200":
          description: Workout stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutStats"

  /workouts/by-day-label:
    get:
      operationId: getWorkoutsByDayLabel
      tags: [workouts]
      summary: Get all workouts for a specific day label (for session review comparison)
      parameters:
        - name: label
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workouts for this day label
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutLog"

  /workouts/{id}:
    delete:
      operationId: deleteWorkout
      tags: [workouts]
      summary: Delete a logged workout session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Check-ins ─────────────────────────────────────────────────────────────────
  /checkins:
    get:
      operationId: listCheckins
      tags: [checkins]
      summary: List all check-ins for the user
      responses:
        "200":
          description: Check-ins list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Checkin"
    post:
      operationId: submitCheckin
      tags: [checkins]
      summary: Submit weekly check-in and trigger AI program adjustment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckinInput"
      responses:
        "201":
          description: Check-in submitted and AI adjustment generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinResult"

  /checkins/latest:
    get:
      operationId: getLatestCheckin
      tags: [checkins]
      summary: Get the most recent check-in (to decide if banner should show)
      responses:
        "200":
          description: Latest check-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkin"
        "404":
          description: No check-ins yet

  /checkins/adherence:
    get:
      operationId: getCheckinAdherence
      tags: [checkins]
      summary: Sessions logged vs planned this week, for the check-in form
      responses:
        "200":
          description: Session adherence for the current 7-day window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionAdherence"
        "404":
          description: No AI-generated program to measure against

  # ── Progress ──────────────────────────────────────────────────────────────────
  /progress/volume:
    get:
      operationId: getVolumeProgress
      tags: [progress]
      summary: Weekly total volume over time (for line chart)
      responses:
        "200":
          description: Volume data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VolumePoint"

  /progress/strength:
    get:
      operationId: getStrengthProgress
      tags: [progress]
      summary: Max weight per exercise over time
      parameters:
        - name: exercise
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Strength data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrengthPoint"

  /progress/prs:
    get:
      operationId: getPersonalRecords
      tags: [progress]
      summary: All-time personal records per exercise
      responses:
        "200":
          description: Personal records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonalRecord"

  /progress/muscle-volume:
    get:
      operationId: getMuscleVolumeBreakdown
      tags: [progress]
      summary: Weekly sets per muscle group (stacked bar chart data)
      responses:
        "200":
          description: Muscle volume breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MuscleVolumeWeek"

  /progress/exercises:
    get:
      operationId: listTrackedExercises
      tags: [progress]
      summary: List all exercises the user has logged (for the strength chart dropdown)
      responses:
        "200":
          description: Exercise names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ── Bodyweight ────────────────────────────────────────────────────────────────
  /bodyweight:
    post:
      operationId: logBodyweight
      tags: [bodyweight]
      summary: Log (upsert) the bodyweight entry for a given date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BodyweightLogInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BodyweightLog"

  /bodyweight/today:
    get:
      operationId: getTodaysBodyweight
      tags: [bodyweight]
      summary: Get the bodyweight entry for a given date, if logged (drives the dashboard card's state)
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entry for that date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BodyweightLog"
        "404":
          description: Not logged yet

  /progress/bodyweight:
    get:
      operationId: getBodyweightProgress
      tags: [progress]
      summary: Bodyweight over time (for line chart)
      responses:
        "200":
          description: Bodyweight data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BodyweightPoint"

  /progress/goal:
    get:
      operationId: getGoalProgress
      tags: [progress]
      summary: Trend weight vs. goal weight, with a 14-day trailing-rate projected target date
      responses:
        "200":
          description: Goal progress summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalProgress"

  # ── Daily logs (calories / steps / cardio) ──────────────────────────────────
  /daily-checkin:
    post:
      operationId: submitDailyCheckin
      tags: [dailyLogs]
      summary: Log (upsert) today's calories/steps/cardio, and optionally bodyweight, in one call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyCheckinInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyCheckinResult"

  /daily-logs/week:
    get:
      operationId: getDailyLogsWeek
      tags: [dailyLogs]
      summary: Get a 7-day window of daily logs (calories/steps/cardio/weight) plus this week's phase
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 7 days of merged daily-log data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLogsWeekResult"

  # ── Calendar colours ──────────────────────────────────────────────────────────
  /calendar/colors:
    get:
      operationId: getCalendarColors
      tags: [calendar]
      summary: Get all calendar day-label colour mappings for the user
      responses:
        "200":
          description: Colour mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarColor"
    post:
      operationId: upsertCalendarColor
      tags: [calendar]
      summary: Save or update a colour for a day label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarColorInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarColor"

  # ── Subscriptions ─────────────────────────────────────────────────────────────
  /subscriptions/current:
    get:
      operationId: getSubscription
      tags: [subscriptions]
      summary: Get current subscription status
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/checkout:
    post:
      operationId: createCheckoutSession
      tags: [subscriptions]
      summary: Create a Stripe checkout session for Pro plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /subscriptions/portal:
    post:
      operationId: createPortalSession
      tags: [subscriptions]
      summary: Create a Stripe customer portal session
      responses:
        "200":
          description: Portal URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSession"

  /subscriptions/webhook:
    post:
      operationId: stripeWebhook
      tags: [subscriptions]
      summary: Stripe webhook endpoint
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Profile ────────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [userId, mode, goal, experience, trainingDays, equipment, priorityMuscles, onboardingComplete, createdAt]
      properties:
        userId:                 { type: string }
        name:                   { type: ["string", "null"] }
        mode:                   { type: string }
        goal:                   { type: string }
        experience:             { type: string }
        trainingDays:           { type: integer }
        equipment:              { type: array, items: { type: string } }
        age:                    { type: ["integer", "null"] }
        sex:                    { type: ["string", "null"] }
        weight:                 { type: ["number", "null"] }
        weightUnit:             { type: ["string", "null"] }
        goalWeight:             { type: ["number", "null"] }
        activityLevel:          { type: ["string", "null"] }
        preferredRestDays:      { type: array, items: { type: string } }
        injuries:               { type: ["string", "null"] }
        injurySeverity:         { type: ["string", "null"], enum: [low, medium, high, null] }
        priorityMuscles:        { type: array, items: { type: string } }
        onboardingComplete:     { type: boolean }
        onboardingCompletedAt:  { type: ["string", "null"] }
        calibrationWalkthroughSeenAt: { type: ["string", "null"] }
        programPageTourSeenAt: { type: ["string", "null"] }
        weightLoggingTourSeenAt: { type: ["string", "null"] }
        dashboardTourSeenAt: { type: ["string", "null"] }
        createdAt:              { type: string }

    UserProfileInput:
      type: object
      required: [mode, trainingDays]
      properties:
        name:                   { type: string }
        mode:                   { type: string }
        goal:                   { type: string }
        experience:             { type: string }
        trainingDays:           { type: integer }
        equipment:              { type: array, items: { type: string } }
        age:                    { type: ["integer", "null"] }
        sex:                    { type: ["string", "null"] }
        weight:                 { type: ["number", "null"] }
        weightUnit:             { type: ["string", "null"] }
        goalWeight:             { type: ["number", "null"] }
        activityLevel:          { type: ["string", "null"] }
        preferredRestDays:      { type: array, items: { type: string } }
        injuries:               { type: ["string", "null"] }
        injurySeverity:         { type: ["string", "null"], enum: [low, medium, high, null] }
        priorityMuscles:        { type: array, items: { type: string } }

    UserProfileUpdate:
      type: object
      properties:
        name:           { type: string }
        mode:           { type: string }
        age:            { type: ["integer", "null"] }
        weight:         { type: ["number", "null"] }
        weightUnit:     { type: ["string", "null"] }
        injuries:       { type: ["string", "null"] }
        injurySeverity: { type: ["string", "null"], enum: [low, medium, high, null] }
        calibrationWalkthroughSeenAt: { type: ["string", "null"] }
        programPageTourSeenAt: { type: ["string", "null"] }
        weightLoggingTourSeenAt: { type: ["string", "null"] }
        dashboardTourSeenAt: { type: ["string", "null"] }

    # ── Programs ───────────────────────────────────────────────────────────────
    Exercise:
      type: object
      required: [name, sets, reps, muscle]
      properties:
        name:            { type: string }
        sets:            { type: integer }
        reps:            { type: string }
        rpe:             { type: ["integer", "null"] }
        restSeconds:     { type: ["integer", "null"] }
        cue:             { type: ["string", "null"] }
        muscle:          { type: string }
        secondaryMuscle: { type: ["string", "null"] }
        isUnilateral:    { type: boolean }

    ProgramDay:
      type: object
      required: [dayNumber, label, focus, exercises]
      properties:
        dayNumber:  { type: integer }
        label:      { type: string }
        focus:      { type: string }
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/Exercise"

    ProgramHighlight:
      type: object
      required: [title, detail]
      properties:
        title:  { type: string }
        detail: { type: string }

    Program:
      type: object
      required: [id, userId, weekNumber, programName, splitType, programHighlights, days, aiGenerated, generatedAt]
      properties:
        id:           { type: integer }
        userId:       { type: string }
        weekNumber:   { type: integer }
        programName:  { type: string }
        splitType:    { type: string }
        programHighlights:
          type: array
          items:
            $ref: "#/components/schemas/ProgramHighlight"
        aiGenerated:  { type: boolean }
        days:
          type: array
          items:
            $ref: "#/components/schemas/ProgramDay"
        generatedAt:  { type: string }
        longTermPhase:       { type: ["string", "null"], enum: [gain_weight, lose_weight, maintain, null] }
        shortTermPhase:      { type: ["string", "null"], enum: [calibration, calibration_review, bulk, maintenance, reverse_diet, diet, mini_cut, deload, null] }
        energyBalance:       { type: ["string", "null"], enum: [surplus, maintenance, deficit, high_deficit, null] }
        trainingWorkload:
          type: ["object", "null"]
          properties:
            daysTrained:     { type: integer }
            totalVolumeSets: { type: integer }
        longTermGoalWeight:  { type: ["number", "null"] }
        shortTermGoalWeight: { type: ["number", "null"] }
        dailyStepTarget:     { type: ["integer", "null"] }
        dailyCalorieTarget:  { type: ["integer", "null"] }
        weekInPhase:         { type: ["integer", "null"] }
        phaseTotalWeeks:     { type: ["integer", "null"] }
        cardioIntensity:
          type: ["object", "null"]
          properties:
            bpmMin: { type: integer }
            bpmMax: { type: integer }
            level:  { type: string, enum: [low, moderate, high] }
        startDate:           { type: ["string", "null"] }

    ProgramStartDateUpdate:
      type: object
      required: [startDate]
      properties:
        startDate: { type: string, format: date }

    ManualProgramInput:
      type: object
      required: [programName, splitType, days]
      properties:
        programName:  { type: string, maxLength: 120 }
        splitType:    { type: string, maxLength: 80 }
        days:
          type: array
          items:
            $ref: "#/components/schemas/ProgramDay"

    ProgramFeedback:
      type: object
      required: [categories, note]
      properties:
        categories:
          type: array
          items:
            type: string
            enum:
              - training_days
              - exercises
              - sets
              - split
              - order
              - session_length
              - equipment
              - priority_muscles
              - overall_volume
        note: { type: string, maxLength: 1000 }

    GenerateProgramInput:
      type: object
      properties:
        feedback:
          $ref: "#/components/schemas/ProgramFeedback"

    # ── Workouts ──────────────────────────────────────────────────────────────
    LoggedSet:
      type: object
      required: [setNumber, weight, completed]
      properties:
        setNumber: { type: integer }
        weight:    { type: number }
        reps:      { type: ["integer", "null"] }
        repsLeft:  { type: ["integer", "null"] }
        repsRight: { type: ["integer", "null"] }
        rpe:       { type: ["integer", "null"] }
        completed: { type: boolean }
        isNewPr:   { type: ["boolean", "null"] }

    LoggedExercise:
      type: object
      required: [name, muscle, sets]
      properties:
        name:   { type: string }
        muscle: { type: string }
        sets:
          type: array
          items:
            $ref: "#/components/schemas/LoggedSet"

    WorkoutLog:
      type: object
      required: [id, userId, date, dayNumber, weekNumber, exercisesLogged, createdAt, mode]
      properties:
        id:               { type: integer }
        userId:           { type: string }
        date:             { type: string }
        dayNumber:        { type: integer }
        weekNumber:       { type: integer }
        dayLabel:         { type: ["string", "null"] }
        mode:             { type: string, enum: [ai, independent], description: "Training mode the user was in when this session was logged" }
        exercisesLogged:
          type: array
          items:
            $ref: "#/components/schemas/LoggedExercise"
        notes:            { type: ["string", "null"] }
        createdAt:        { type: string }

    WorkoutLogInput:
      type: object
      required: [date, dayNumber, weekNumber, exercisesLogged]
      properties:
        date:             { type: string }
        dayNumber:        { type: integer }
        weekNumber:       { type: integer }
        dayLabel:         { type: ["string", "null"] }
        exercisesLogged:
          type: array
          items:
            $ref: "#/components/schemas/LoggedExercise"
        notes:            { type: ["string", "null"] }

    WorkoutStats:
      type: object
      required: [currentWeek, totalLogged, lastSessionDate, streakDays]
      properties:
        currentWeek:     { type: integer }
        totalLogged:     { type: integer }
        lastSessionDate: { type: ["string", "null"] }
        streakDays:      { type: integer }

    # ── Check-ins ─────────────────────────────────────────────────────────────
    Checkin:
      type: object
      required: [id, userId, weekNumber, energy, sleep, soreness, submittedAt]
      properties:
        id:              { type: integer }
        userId:          { type: string }
        weekNumber:      { type: integer }
        energy:          { type: integer }
        sleep:           { type: integer }
        soreness:        { type: string }
        # Legacy self-report, no longer collected - see sessionsLogged/sessionsPlanned.
        completion:      { type: ["string", "null"] }
        sessionsPlanned: { type: ["integer", "null"] }
        sessionsLogged:  { type: ["integer", "null"] }
        missedSessionReason: { type: ["string", "null"] }
        # Null means the legacy 1-10 energy/sleep scale; new rows are 5.
        ratingScaleMax:  { type: ["integer", "null"] }
        hungerAppetite:  { type: ["integer", "null"] }
        offDayDeviation: { type: ["boolean", "null"] }
        exerciseIssues:  { type: ["string", "null"] }
        wentWell:        { type: ["string", "null"] }
        didntGoWell:     { type: ["string", "null"] }
        sleepDecline:    { type: ["string", "null"] }
        digestionIssues: { type: ["string", "null"] }
        notes:           { type: ["string", "null"] }
        submittedAt:     { type: string }

    CheckinInput:
      type: object
      # weekNumber and completion are deliberately absent: the server derives the
      # training week from the profile and session adherence from workout_logs.
      required: [energy, sleep, soreness, hungerAppetite, offDayDeviation]
      properties:
        energy:          { type: integer, minimum: 1, maximum: 5 }
        sleep:           { type: integer, minimum: 1, maximum: 5 }
        soreness:        { type: string }
        hungerAppetite:  { type: integer, minimum: 1, maximum: 5 }
        offDayDeviation: { type: boolean }
        missedSessionReason:
          type: ["string", "null"]
          enum: [forgot_to_log, time, fatigue, injury, other, null]
        exerciseIssues:  { type: ["string", "null"] }
        wentWell:        { type: ["string", "null"] }
        didntGoWell:     { type: ["string", "null"] }
        sleepDecline:    { type: ["string", "null"] }
        digestionIssues: { type: ["string", "null"] }
        notes:           { type: ["string", "null"] }

    AdherenceDay:
      type: object
      required: [dayNumber, label, date]
      properties:
        dayNumber: { type: integer }
        label:     { type: string }
        date:      { type: ["string", "null"] }

    SessionAdherence:
      type: object
      required: [windowStart, windowEnd, plannedSessions, loggedSessions, loggedDays, missingDays, extraSessions]
      properties:
        windowStart:     { type: string }
        windowEnd:       { type: string }
        plannedSessions: { type: integer }
        loggedSessions:  { type: integer }
        loggedDays:
          type: array
          items:
            $ref: "#/components/schemas/AdherenceDay"
        missingDays:
          type: array
          items:
            $ref: "#/components/schemas/AdherenceDay"
        extraSessions:   { type: integer }

    CheckinResult:
      type: object
      required: [checkin, aiMessage, updatedProgram]
      properties:
        checkin:
          $ref: "#/components/schemas/Checkin"
        aiMessage:      { type: string }
        updatedProgram:
          $ref: "#/components/schemas/Program"

    # ── Progress ──────────────────────────────────────────────────────────────
    VolumePoint:
      type: object
      required: [week, totalSets]
      properties:
        week:       { type: integer }
        totalSets:  { type: integer }
        totalReps:  { type: integer }

    StrengthPoint:
      type: object
      required: [date, maxWeight]
      properties:
        date:       { type: string }
        maxWeight:  { type: number }
        exercise:   { type: string }

    PersonalRecord:
      type: object
      required: [exercise, maxWeight, date]
      properties:
        exercise:   { type: string }
        maxWeight:  { type: number }
        reps:       { type: ["integer", "null"] }
        date:       { type: string }

    MuscleVolumeWeek:
      type: object
      required: [week]
      properties:
        week:        { type: integer }
        chest:       { type: integer }
        shoulders:   { type: integer }
        biceps:      { type: integer }
        triceps:     { type: integer }
        upperBack:   { type: integer }
        lats:        { type: integer }
        quads:       { type: integer }
        hamstrings:  { type: integer }
        glutes:      { type: integer }
        calves:      { type: integer }
        core:        { type: integer }

    BodyweightPoint:
      type: object
      required: [date, weight]
      properties:
        date:       { type: string }
        weight:     { type: number }

    # ── Bodyweight ────────────────────────────────────────────────────────────
    BodyweightLog:
      type: object
      required: [id, userId, date, weight, weightUnit, createdAt]
      properties:
        id:         { type: integer }
        userId:     { type: string }
        date:       { type: string }
        weight:     { type: number }
        weightUnit: { type: string }
        createdAt:  { type: string }
        updatedAt:  { type: string }

    BodyweightLogInput:
      type: object
      required: [date, weight]
      properties:
        date:       { type: string }
        weight:     { type: number }

    # ── Daily logs (calories / steps / cardio) ─────────────────────────────────
    DailyLog:
      type: object
      required: [id, userId, date, createdAt]
      properties:
        id:            { type: integer }
        userId:        { type: string }
        date:          { type: string }
        calories:      { type: ["integer", "null"] }
        steps:         { type: ["integer", "null"] }
        cardioType:    { type: ["string", "null"] }
        cardioMinutes: { type: ["integer", "null"] }
        createdAt:     { type: string }
        updatedAt:     { type: string }

    DailyCheckinInput:
      type: object
      required: [date]
      properties:
        date:          { type: string }
        weight:        { type: ["number", "null"] }
        calories:      { type: ["integer", "null"] }
        steps:         { type: ["integer", "null"] }
        cardioType:    { type: ["string", "null"] }
        cardioMinutes: { type: ["integer", "null"] }

    DailyCheckinResult:
      type: object
      required: [dailyLog]
      properties:
        dailyLog:
          $ref: "#/components/schemas/DailyLog"
        bodyweightLog:
          oneOf:
            - $ref: "#/components/schemas/BodyweightLog"
            - type: "null"

    DailyLogWeekEntry:
      type: object
      required: [date]
      properties:
        date:          { type: string }
        calories:      { type: ["integer", "null"] }
        steps:         { type: ["integer", "null"] }
        cardioType:    { type: ["string", "null"] }
        cardioMinutes: { type: ["integer", "null"] }
        weight:        { type: ["number", "null"] }
        weightUnit:    { type: ["string", "null"] }

    DailyLogsWeekResult:
      type: object
      required: [days]
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/DailyLogWeekEntry"
        shortTermPhase: { type: ["string", "null"], enum: [calibration, calibration_review, bulk, maintenance, reverse_diet, diet, mini_cut, deload, null] }

    GoalProgress:
      type: object
      required: [startWeight, startDate, currentTrendWeight]
      properties:
        startWeight:        { type: number }
        startDate:          { type: string }
        currentTrendWeight: { type: number }
        goalWeight:         { type: ["number", "null"] }
        percentToGoal:      { type: ["number", "null"] }
        targetDate:         { type: ["string", "null"] }

    # ── Calendar colours ──────────────────────────────────────────────────────
    CalendarColor:
      type: object
      required: [id, userId, dayLabel, hexColor]
      properties:
        id:         { type: integer }
        userId:     { type: string }
        dayLabel:   { type: string }
        hexColor:   { type: string }

    CalendarColorInput:
      type: object
      required: [dayLabel, hexColor]
      properties:
        dayLabel:   { type: string, maxLength: 64 }
        hexColor:   { type: string, pattern: "^#[0-9a-fA-F]{6}$" }

    # ── Subscriptions ─────────────────────────────────────────────────────────
    Subscription:
      type: object
      required: [plan, status]
      properties:
        userId:                 { type: string }
        plan:                   { type: string }
        status:                 { type: string }
        stripeCustomerId:       { type: ["string", "null"] }
        stripeSubscriptionId:   { type: ["string", "null"] }
        currentPeriodEnd:       { type: ["string", "null"] }

    CheckoutInput:
      type: object
      required: [plan, successUrl, cancelUrl]
      properties:
        plan:       { type: string }
        successUrl: { type: string }
        cancelUrl:  { type: string }

    CheckoutSession:
      type: object
      required: [url]
      properties:
        url: { type: string }

    PortalSession:
      type: object
      required: [url]
      properties:
        url: { type: string }
